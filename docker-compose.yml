services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pampa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pampa}
      POSTGRES_DB: ${POSTGRES_DB:-pampatickets}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pampa} -d ${POSTGRES_DB:-pampatickets}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pampa}:${POSTGRES_PASSWORD:-pampa}@db:5432/${POSTGRES_DB:-pampatickets}
      SECRET_KEY: ${SECRET_KEY}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_BASE_URL_UAT: ${ASAAS_BASE_URL_UAT}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
